name: Desktop Release

# Triggered by tags like `desktop-v0.1.0`. Builds vSkill Desktop on macOS,
# Windows, and Linux runners; signs/notarizes per platform; uploads to
# Cloudflare R2 (`vskill-desktop` bucket → verified-skill.com/desktop/*);
# publishes a minisign-signed `latest.json` for the Tauri Updater plugin;
# creates a GitHub Release as a defense-in-depth mirror.
#
# Owner: 0829 Track D (ci-pipeline-agent)
# Spec ACs: AC-US13-01..06 (release pipeline), AC-US14-01..05 (updater + sig),
#           AC-US16-01..05 (manifest hosting), AC-US17-01..05 (changelog)
# Plan ref: .specweave/increments/0829-vskill-distribution-and-marketing/plan.md §7
# ADR ref:  .specweave/docs/internal/architecture/adr/0829-01-update-manifest-hosting.md

on:
  push:
    tags:
      - 'desktop-v*'

permissions: write-all

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            rustup_targets: aarch64-apple-darwin
            bundles: app,dmg
            platform: macos
            build: scripts/release/macos-build.sh
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            rustup_targets: x86_64-pc-windows-msvc
            bundles: msi,nsis
            platform: windows
            build: scripts/release/windows-build.ps1
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rustup_targets: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage
            platform: linux
            build: scripts/release/linux-build.sh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustup_targets }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libfuse2 rpm gnupg
          # minisign isn't in jammy main; download the prebuilt static binary
          MINISIGN_VERSION=0.12
          curl -fsSL "https://github.com/jedisct1/minisign/releases/download/${MINISIGN_VERSION}/minisign-${MINISIGN_VERSION}-linux.tar.gz" -o /tmp/minisign.tgz
          tar -xzf /tmp/minisign.tgz -C /tmp
          sudo install -m 0755 /tmp/minisign-linux/x86_64/minisign /usr/local/bin/minisign
          minisign -v

      - name: macOS — import Developer ID certificate
        if: matrix.platform == 'macos'
        env:
          BUILD_CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          BUILD_CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$BUILD_CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$BUILD_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm -f /tmp/cert.p12

      - name: macOS — store notarytool credentials
        if: matrix.platform == 'macos'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
        run: |
          echo "$ASC_KEY_B64" | base64 --decode > /tmp/AuthKey.p8
          xcrun notarytool store-credentials vskill \
            --key /tmp/AuthKey.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID"

      - name: Install npm deps + build studio bundle
        run: |
          npm ci
          npm run build
          npm run build:eval-ui

      - name: Build sidecar (macOS/Linux)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            bash scripts/desktop/build-sidecar-linux.sh
          else
            bash scripts/desktop/build-sidecar.sh
          fi

      - name: Build sidecar (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: pwsh scripts/desktop/build-sidecar-windows.ps1

      - name: Derive desktop version from git tag + sync into Cargo.toml + tauri.conf.json
        # Git tag `desktop-v1.0.14` → version `1.0.14`. This decouples the
        # desktop release cadence from the npm CLI's `package.json` version
        # (which ships separately). Without this step, asset filenames carry
        # whatever was hardcoded in src-tauri/Cargo.toml at commit time, which
        # may diverge from the tag (v1.0.13 tag with v1.0.16 filenames was the
        # confusion that drove this fix).
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#desktop-v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([\.\-].*)?$ ]]; then
            echo "::error::Tag '${TAG}' does not match desktop-vX.Y.Z; got VERSION='${VERSION}'"
            exit 1
          fi
          echo "Desktop version: ${VERSION}"
          # sed in-place — works on macOS (BSD) + Linux (GNU) when given empty
          # backup arg differently; use the portable -i.bak then rm pattern.
          sed -i.bak -E "s/^version = \"[^\"]+\"$/version = \"${VERSION}\"/" src-tauri/Cargo.toml && rm src-tauri/Cargo.toml.bak
          # tauri.conf.json — use python for reliable JSON edit
          python3 -c "import json,sys; p='src-tauri/tauri.conf.json'; d=json.load(open(p)); d['version']='${VERSION}'; json.dump(d, open(p,'w'), indent=2)"
          # Cargo.lock — re-resolve so the locked version matches Cargo.toml
          (cd src-tauri && cargo update -p vskill-desktop --precise "${VERSION}" 2>&1 || cargo generate-lockfile)
          echo "version-synced=true" >> $GITHUB_OUTPUT

      - name: Pre-flight — verify Tauri signing key is present
        # Without this guard, tauri-action silently builds bundles WITHOUT
        # .sig peers (the env var is optional from its perspective). That
        # breaks the Tauri Updater channel because there's nothing for
        # latest.json's `signature` field to reference. v1.0.12 shipped this
        # way; never again.
        shell: bash
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${RAW_TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty — auto-update bundles will be unsigned. Aborting."
            exit 1
          fi
          # 2026-05-09: every desktop CI before v1.0.18 failed at the
          # base64 decode step inside tauri-action with
          # `Invalid symbol 32, offset 9` — ASCII 32 is a SPACE. The
          # secret was set with whitespace/newlines that tauri-action's
          # base64 decoder rejects. Strip ALL whitespace before passing
          # the value downstream so the workflow is resilient to a
          # one-time misformatted upload (the proper long-term fix is
          # to re-set the secret cleanly via
          # `base64 -i minisign-priv.key | tr -d '\\n'` then `gh secret
          # set`, but until that lands this defensive scrub keeps the
          # release pipeline working).
          CLEAN_KEY="$(printf '%s' "${RAW_TAURI_SIGNING_PRIVATE_KEY}" | tr -d ' \t\r\n')"
          if [ "${#CLEAN_KEY}" -ne "${#RAW_TAURI_SIGNING_PRIVATE_KEY}" ]; then
            STRIPPED=$(( ${#RAW_TAURI_SIGNING_PRIVATE_KEY} - ${#CLEAN_KEY} ))
            echo "::warning::Stripped ${STRIPPED} whitespace char(s) from TAURI_SIGNING_PRIVATE_KEY before base64 decode."
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY present (raw_length=${#RAW_TAURI_SIGNING_PRIVATE_KEY}, clean_length=${#CLEAN_KEY})"
          # Export the cleaned value to subsequent steps via
          # GITHUB_ENV so tauri-action receives the whitespace-free
          # base64 instead of the raw secret. Standard GH-Actions
          # mechanism — the value is masked because it derives from a
          # secret.
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF_CLEAN_KEY"
            echo "${CLEAN_KEY}"
            echo "EOF_CLEAN_KEY"
          } >> "${GITHUB_ENV}"

      - name: Diagnose passphrase encoding (non-revealing)
        # Prints SHA-256 of the env var so we can verify what bytes GH
        # actually stored vs what we uploaded, without leaking the value.
        # Expected (no-newline form): 22474c7dd76281e5115a1f22975eb71d76152a3d891f1d8bac62afe040515fb5
        # Expected (with newline):    9a2e6c3a248a7fc530f543562ec79cfd24d52566d918d12996edbc3d029669f6
        shell: bash
        env:
          P: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "Passphrase length: ${#P}"
          echo "Passphrase SHA-256 (raw): $(printf '%s' "$P" | shasum -a 256 | awk '{print $1}')"
          echo "Passphrase SHA-256 (with trailing newline): $(printf '%s\n' "$P" | shasum -a 256 | awk '{print $1}')"
          # Strip whitespace defensively
          CLEAN_P=$(printf '%s' "$P" | tr -d ' \t\r\n')
          echo "Passphrase clean length: ${#CLEAN_P}"
          echo "Passphrase clean SHA-256: $(printf '%s' "$CLEAN_P" | shasum -a 256 | awk '{print $1}')"
          if [ "${#CLEAN_P}" -ne "${#P}" ]; then
            STRIPPED=$(( ${#P} - ${#CLEAN_P} ))
            echo "::warning::Stripped ${STRIPPED} whitespace char(s) from TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
          fi
          # Export cleaned value for the next step (overrides the raw secret).
          {
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF_CLEAN_P"
            echo "${CLEAN_P}"
            echo "EOF_CLEAN_P"
          } >> "${GITHUB_ENV}"

      - name: Build Tauri app + sign + (macOS) notarize
        # tauri-action signs the update bundle (.tar.gz/.zip) using
        # TAURI_SIGNING_PRIVATE_KEY (minisign Ed25519 per ADR 0829-01 §2),
        # codesigns the .app/.dmg via APPLE_* on macOS, and emits .sig
        # peers next to each update bundle.
        #
        # `includeUpdaterJson: false` — we publish our own latest.json from
        # vskill-platform's edge route + R2 (publish-manifest.sh handles the
        # canonical manifest). Letting tauri-action write its own creates
        # a stale `latest.json` asset on the GitHub Release that confuses
        # consumers.
        #
        # `uploadUpdaterSignatures: true` (default) — ensures the .sig peer
        # files are uploaded as Release assets even when the release is
        # still in draft state (this was the gap in v1.0.12).
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          # macOS codesigning + notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Tauri Updater minisign keypair (all platforms). Note: we
          # intentionally do NOT re-pull the raw secrets here — the
          # whitespace-stripped CLEAN_KEY and CLEAN_P (passphrase) are
          # exported into GITHUB_ENV by the pre-flight + diagnostic steps
          # above and inherited by this step. Inheriting via GITHUB_ENV
          # instead of `${{ secrets.X }}` is what makes the defensive
          # scrub effective. v1.0.25 failed because the passphrase was
          # explicitly re-pulled from secrets here, bypassing the cleanup.
          # 0836 US-004: src-tauri/build.rs panics if GITHUB_OAUTH_CLIENT_ID
          # is unset or equals the placeholder `Iv1.placeholder-replace-before-ship`
          # for release builds — guards against shipping a binary that can never
          # complete the device-flow sign-in. The post-build verification step
          # below greps the compiled binary for the placeholder string as a
          # second-line check (defense-in-depth).
          #
          # Hardcoded here (not a secret) because OAuth App client IDs are
          # PUBLIC: device-flow leaks them in network traffic, and they're
          # baked into every shipped desktop binary at compile time. The
          # only thing that's secret is the OAuth App's client_secret, which
          # vskill does NOT use (device-flow is client-secret-less).
          # Source: Obsidian vault entry for "Github OAuth Auth token vskill
          # verified skill.md" (App: vskill, app id 3406130, anton.abyzov@gmail.com).
          GITHUB_OAUTH_CLIENT_ID: Ov23li6H8OpvPfuhyDEt
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Skill Studio ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          uploadUpdaterSignatures: true

      - name: Verify .sig peer files were generated
        # Defensive — if tauri-action exited 0 but no .sig file landed next
        # to the bundle, something is silently wrong with the signing config
        # and we should not silently ship an unsigned release.
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "::error::expected bundle dir not found: $BUNDLE_DIR"
            exit 1
          fi
          # Map matrix.platform -> the bundle subdir whose .sig peer is required.
          case "${{ matrix.platform }}" in
            macos)   PEERS=("$BUNDLE_DIR/macos"/*.app.tar.gz.sig) ;;
            windows) PEERS=("$BUNDLE_DIR/nsis"/*-setup.nsis.zip.sig "$BUNDLE_DIR/msi"/*.msi.zip.sig) ;;
            linux)   PEERS=("$BUNDLE_DIR/appimage"/*.AppImage.tar.gz.sig) ;;
          esac
          MISSING=0
          for p in "${PEERS[@]}"; do
            # Glob may not expand if no match; check literal
            if ! compgen -G "$p" > /dev/null; then
              echo "::error::missing .sig peer for ${{ matrix.platform }}: $p"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "::error::tauri-action did not emit expected .sig files. Auto-update will be broken."
            exit 1
          fi
          echo "All expected .sig peers present for ${{ matrix.platform }}."

      - name: Verify code signing (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          DMG=$(ls -1t src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          spctl -a -t open -vv --context context:primary-signature "$DMG" || true
          codesign -dv --verbose=4 "$DMG" 2>&1 | head -20

      - name: 0836 US-004 — assert no placeholder client_id in release binary
        # Defense-in-depth alongside src-tauri/build.rs: even if a future
        # change bypasses build.rs (edited locally, vendored release, etc.),
        # `strings | grep` against the signed binary catches the placeholder.
        # v1.0.17 shipped the placeholder; this gate ensures it never
        # happens again. We grep ONLY the host-platform binary path because
        # `strings` semantics differ across runners — the macOS binary is
        # the canonical artifact users ship, so we check there as the
        # source of truth.
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          BIN_GLOB="src-tauri/target/${{ matrix.target }}/release/bundle/macos"/*.app/Contents/MacOS/*
          shopt -s nullglob
          BINS=( $BIN_GLOB )
          if [ "${#BINS[@]}" -eq 0 ]; then
            echo "::error::no signed binary found at $BIN_GLOB"
            exit 1
          fi
          PLACEHOLDER='Iv1.placeholder-replace-before-ship'
          FAIL=0
          for BIN in "${BINS[@]}"; do
            echo "Scanning: $BIN"
            if strings "$BIN" | grep -q -F "$PLACEHOLDER"; then
              echo "::error::Placeholder GITHUB_OAUTH_CLIENT_ID found in $BIN"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "OK: placeholder string absent from all release binaries."

      - name: GPG sign Linux artifacts
        if: matrix.platform == 'linux'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_FPR: ${{ secrets.GPG_KEY_FPR }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          bash scripts/release/sign-linux-artifacts.sh src-tauri/target/release/bundle/

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/msi/*.msi.zip
            src-tauri/target/**/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/**/release/bundle/nsis/*-setup.exe
            src-tauri/target/**/release/bundle/nsis/*-setup.nsis.zip
            src-tauri/target/**/release/bundle/nsis/*-setup.nsis.zip.sig
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/deb/*.deb.asc
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/rpm/*.rpm.asc
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/appimage/*.AppImage.asc
            src-tauri/target/**/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/**/release/bundle/appimage/*.AppImage.tar.gz.sig

  publish:
    name: Publish to R2 + GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts/

      - name: Install jq + aws-cli + git-cliff
        run: |
          sudo apt-get update
          sudo apt-get install -y jq awscli
          curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.6.1/git-cliff-2.6.1-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /tmp
          sudo install /tmp/git-cliff-2.6.1/git-cliff /usr/local/bin/git-cliff

      - name: Generate release notes
        run: bash scripts/release/release-notes.sh "${{ github.ref_name }}"

      - name: Create / update GitHub Release (mirror)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'vSkill Desktop ${{ github.ref_name }}'
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.msi
            release-artifacts/**/*-setup.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.asc
            release-artifacts/**/*.sig

      - name: Publish to Cloudflare R2 + atomic latest.json
        env:
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          # Strip the desktop-v prefix → semver only.
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          bash scripts/release/publish-manifest.sh "$VERSION" ./release-artifacts/

      - name: Update Homebrew Cask (staging tap)
        if: ${{ !contains(github.ref_name, '-rc') }}
        continue-on-error: true
        run: |
          if [ -x scripts/release/update-brew-cask.sh ]; then
            bash scripts/release/update-brew-cask.sh "${GITHUB_REF_NAME#desktop-v}"
          else
            echo "update-brew-cask.sh not found, skipping (other agent owns this script)"
          fi

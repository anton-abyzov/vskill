<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Skill Studio is already running</title>
    <script>
      (function () {
        try {
          var stored = null;
          try { stored = localStorage.getItem("vskill-theme"); } catch (e) { stored = null; }
          var mode = stored === "light" || stored === "dark" || stored === "auto" ? stored : "auto";
          var systemDark = false;
          try { systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches; } catch (e) {}
          var resolved = mode === "auto" ? (systemDark ? "dark" : "light") : mode;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themeMode = mode;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/lifecycle/main.tsx"></script>
  </body>
</html>

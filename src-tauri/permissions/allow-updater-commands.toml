# Tauri 2.x ACL — updater-only command allow-list.
#
# Scoped subset of `allow-app-commands` that is safe to expose to the
# studio's localhost-served main window (a "remote" origin that renders
# untrusted marketplace skill content). Only the self-update surface is
# granted here — NOT shell, fs, dialog, GitHub OAuth, quota, folder picker,
# or lifecycle commands. Downloaded updates are minisign-signature-verified
# by the updater plugin, so even a hostile caller cannot install arbitrary
# code via these commands.
#
# Consumed by capabilities/studio-updater.json (remote: 127.0.0.1/localhost).

[[permission]]
identifier = "allow-updater-commands"
description = "Updater-only IPC commands the studio window's in-app update banner needs."

commands.allow = [
  "check_for_updates",
  "download_and_install_update",
  "cancel_update",
  "restart_app",
  "get_app_metadata",
  "get_settings",
  "open_preferences",
]

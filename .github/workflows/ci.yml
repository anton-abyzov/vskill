name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Platform-specific smoke test for `vskill diff` — validates that the
  # command runs on Windows PowerShell (AC-US4-05). The JSON smoke uses a
  # Node stub server so the test is hermetic and does not depend on the
  # live platform API being deployed.
  diff-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke — vskill diff --help
        shell: bash
        run: |
          node dist/bin.js diff --help
          # Assert help output contains the three documented flags
          node dist/bin.js diff --help > help.txt
          grep -- "--stat" help.txt
          grep -- "--json" help.txt
          grep -- "--files" help.txt

      - name: Start compare-endpoint stub server
        shell: bash
        run: |
          # Tiny HTTP stub that responds to the compare endpoint.
          # Written as a single-file Node script; zero native deps.
          cat > stub-server.cjs <<'EOF'
          const http = require("http");
          const server = http.createServer((req, res) => {
            res.setHeader("Content-Type", "application/json");
            if (req.url.includes("/versions/compare")) {
              res.end(JSON.stringify({
                source: "github",
                baseSha: "aaaaaaa",
                headSha: "bbbbbbb",
                files: [
                  { filename: "SKILL.md", status: "modified", additions: 2, deletions: 1, patch: "@@ -1 +1,2 @@\n-old\n+new\n+line" },
                ],
                githubCompareUrl: "https://github.com/anton-abyzov/vskill/compare/aaaaaaa...bbbbbbb",
              }));
              return;
            }
            res.statusCode = 404;
            res.end("{}");
          });
          server.listen(8765, "127.0.0.1", () => {
            console.log("stub-server listening on 127.0.0.1:8765");
            // Write PID to a file so we can kill it later (cross-platform).
            require("fs").writeFileSync(".stub-server.pid", String(process.pid));
          });
          EOF
          node stub-server.cjs &
          # Give it a moment to bind.
          node -e "setTimeout(()=>{},400)"

      - name: Smoke — vskill diff <skill> <from> <to> --json (against stub)
        shell: bash
        env:
          VSKILL_API_BASE: http://127.0.0.1:8765
        run: |
          node dist/bin.js diff anton-abyzov/vskill/scout 1.0.0 1.0.1 --json > out.json
          # Assert the output is valid JSON and contains the expected keys
          node -e "const d = JSON.parse(require('fs').readFileSync('out.json','utf8')); if (d.source !== 'github') { console.error('bad source:', d.source); process.exit(1); } if (!Array.isArray(d.files) || d.files.length === 0) { console.error('no files'); process.exit(1); } console.log('json smoke ok:', d.files.length, 'file(s)');"

      - name: Smoke — vskill diff --stat (against stub)
        shell: bash
        env:
          VSKILL_API_BASE: http://127.0.0.1:8765
        run: |
          node dist/bin.js diff anton-abyzov/vskill/scout 1.0.0 1.0.1 --stat

  # Unit tests — Vitest suite across platforms.
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npx vitest run src/commands/diff.test.ts src/api/client.test.ts

  # 0702 T-032 — Cross-platform credential store + `vskill keys` CLI + first-run
  # onboarding tests. Runs on all three OS so we catch Windows-specific path
  # handling, chmod-skip, and TTY detection regressions before merge.
  keys-store-cli:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: FileBackedStore + keys CLI + onboarding tests
        run: npx vitest run src/eval-server/__tests__/file-backed-store.test.ts src/commands/__tests__/keys.test.ts src/__tests__/first-run-onboarding.test.ts

  # 0706 T-008 — Windows compatibility smoke tests for install/update/studio.
  # Verifies the five bug fixes in increment 0706 haven't regressed on
  # Windows (where the original code shelled out to `which`/`lsof`/`ps`).
  # Uses `shell: bash` so Git Bash (pre-installed on windows-latest) runs
  # the same smoke script across all three OSes.
  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Smoke — CLI help surface on all OS (0706 AC-US5-01)
        shell: bash
        run: |
          node dist/bin.js --version
          node dist/bin.js install --help
          node dist/bin.js update --help
          node dist/bin.js studio --help

      - name: Smoke — fixture install runs without crashing (0706 AC-US5-02)
        shell: bash
        run: |
          # Build a minimal LOCAL marketplace fixture so `install --plugin-dir`
          # exercises the canonical installer path (`installPluginDir` in
          # src/commands/add.ts — where the path-traversal guard, EPERM
          # fallback, and `detectInstalledAgents()` live). We use the
          # `--plugin-dir`/`--plugin` flags instead of passing a bare
          # `SKILL.md` path because the CLI's positional `source` argument
          # is parsed as `owner/repo[/skill]`, not as a filesystem path —
          # `../fixture-skill/SKILL.md` would be misread as a GitHub repo
          # reference and never reach the cross-platform code this test
          # is meant to guard.
          mkdir -p fixture-skill/.claude-plugin
          mkdir -p fixture-skill/plugins/smoke-fixture
          cat > fixture-skill/.claude-plugin/marketplace.json <<'EOF'
          {
            "name": "smoke-fixture-marketplace",
            "owner": { "name": "ci-smoke", "email": "ci@example.com" },
            "plugins": [
              {
                "name": "smoke-fixture",
                "description": "Test plugin for 0706 windows-compat CI smoke.",
                "source": "./plugins/smoke-fixture",
                "version": "0.0.1",
                "category": "testing"
              }
            ]
          }
          EOF
          cat > fixture-skill/plugins/smoke-fixture/SKILL.md <<'EOF'
          ---
          name: smoke-fixture
          description: Test skill for 0706 windows-compat CI smoke.
          version: 0.0.1
          ---
          # Smoke Fixture
          This file only exists to exercise the install path.
          EOF
          # Run from a throwaway project root so we never mutate real agents.
          mkdir -p throwaway-project
          cd throwaway-project
          # Use -y (documented flag) to skip prompts. Capture exit code so we
          # can accept any of the three known-graceful outcomes:
          #   - exit 0: install succeeded (some agent was detected on the
          #     runner; the cross-platform install code ran end-to-end).
          #   - exit 2: reserved for future "no agents detected" handling.
          #   - exit 1 WITH a known-graceful output marker: the CLI ran the
          #     cross-platform agent-detection probes (`detectBinary`/
          #     `which`/`lsof`/`ps`) without crashing and exited gracefully
          #     when no agents were found — exactly what the original
          #     0706 T-002/T-003 hardening guards against on Windows.
          # A genuine cross-platform crash (the regression this test exists
          # to catch) produces an unhandled rejection / stack trace, which
          # matches none of the graceful markers and therefore still fails.
          set +e
          node ../dist/bin.js install --plugin-dir ../fixture-skill --plugin smoke-fixture -y > install.out 2>&1
          smoke_exit=$?
          set -e
          cat install.out
          echo "install smoke completed with exit=$smoke_exit"
          # 0706 F-01 hardening: output-shape check. The CLI must produce one
          # of these markers for any graceful outcome. A silent failure
          # (exit 0 with empty output, or a stack trace) matches none and
          # fails the gate.
          if grep -Eq "No AI agents detected|no agents detected|Installed [A-Za-z0-9_-]+ to|Looking up skill in registry|Skill .* not found in registry|Use owner/repo for GitHub installs" install.out; then
            output_ok=1
          else
            output_ok=0
          fi
          if [ "$smoke_exit" -eq 0 ] || [ "$smoke_exit" -eq 2 ]; then
            if [ "$output_ok" -ne 1 ]; then
              echo "::error::install smoke exited cleanly but output matches no known branch — likely silent failure (AC-US5-02)"
              exit 1
            fi
          elif [ "$smoke_exit" -eq 1 ] && [ "$output_ok" -eq 1 ]; then
            # Graceful "no agents detected" on a clean CI runner — the
            # cross-platform detection code ran without crashing.
            echo "install smoke: graceful exit=1 with known-graceful output (AC-US5-02 pass)"
          else
            echo "::error::install smoke crashed (exit=$smoke_exit, output_ok=$output_ok) — AC-US5-02 failure"
            exit 1
          fi

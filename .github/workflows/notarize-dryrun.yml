name: Notarize Dry-Run (nightly)

# Nightly health check: build the macOS .dmg, submit to Apple notarization,
# record the duration. If notarization stalls > 4h (NFR-17), fail the job
# and open a GitHub issue. This runs against `main` so we catch a notary
# regression BEFORE we cut a real release tag.
#
# Owner: 0829 Track D (ci-pipeline-agent), AC NFR-17.

on:
  schedule:
    # 03:00 UTC ≈ 22:00 ET — runs after Anton's normal work day.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  dryrun:
    runs-on: macos-14
    timeout-minutes: 300  # 5h hard ceiling — we alert at 4h.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: universal-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Import Developer ID certificate
        env:
          BUILD_CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          BUILD_CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$BUILD_CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$BUILD_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

      - name: Store notarytool credentials
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
        run: |
          echo "$ASC_KEY_B64" | base64 --decode > /tmp/AuthKey.p8
          xcrun notarytool store-credentials vskill \
            --key /tmp/AuthKey.p8 --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID"

      - name: npm install + studio bundle
        run: |
          npm ci
          npm run build
          npm run build:eval-ui

      - name: Build sidecar
        run: bash scripts/desktop/build-sidecar.sh

      - name: Build Tauri (smoke mode — notarize via build script)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          START=$(date +%s)
          bash scripts/release/macos-build.sh --notarize
          END=$(date +%s)
          DURATION=$((END - START))
          echo "NOTARIZE_DURATION_SECONDS=$DURATION" >> $GITHUB_ENV
          echo "==> Notarize duration: $DURATION seconds ($((DURATION / 60)) min)"

      - name: Alert on stall (>4h)
        if: env.NOTARIZE_DURATION_SECONDS != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DURATION="$NOTARIZE_DURATION_SECONDS"
          THRESHOLD=14400  # 4h in seconds
          if (( DURATION > THRESHOLD )); then
            echo "::warning::Notarization took ${DURATION}s (> 4h threshold)"
            BODY_FILE=$(mktemp)
            {
              echo "Nightly notarize-dryrun took $((DURATION / 60)) minutes (>4h threshold per NFR-17)."
              echo ""
              echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              echo ""
              echo "Action items:"
              echo "- Check Apple's System Status (https://developer.apple.com/system-status/) for notary outages."
              echo "- If green there, file feedback at https://feedbackassistant.apple.com."
              echo "- Disable scheduled releases until duration recovers."
            } > "$BODY_FILE"
            gh issue create \
              --title "Notarization stall: ${DURATION}s on $(date -u +%Y-%m-%d)" \
              --body-file "$BODY_FILE" \
              --label "ops,desktop-release,p1" \
              --repo "$GITHUB_REPOSITORY"
          fi
